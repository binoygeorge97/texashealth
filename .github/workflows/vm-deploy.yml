name: Deploy Frontend to Debian VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app/frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd app/frontend
          npm install

      - name: Build Next.js
        env:
          # Next.js requires these at build time for static generation/hydration
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          cd app/frontend
          npm run build

      - name: Prepare Deployment Package
        # Standalone output doesn't include 'static' or 'public' by default
        run: |
          cd app/frontend
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public/. .next/standalone/public/
          tar -czf ../../deploy.tar.gz -C .next/standalone .

      - name: Copy Archive to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/${{ secrets.USERNAME }}/texashealth/deploy"

      - name: Extract and Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            DEPLOY_DIR=/home/${{ secrets.USERNAME }}/texashealth/app/frontend/dist
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR
            tar -xzf /home/${{ secrets.USERNAME }}/texashealth/deploy/deploy.tar.gz -C $DEPLOY_DIR
            
            cd $DEPLOY_DIR
            # Restart or start the PM2 process using node directly on the standalone server
            sudo pm2 delete texashealth-ui || true
            sudo pm2 start server.js --name texashealth-ui
            sudo pm2 save
